{% extends "base.html" %}

{% block title %}添加物流信息 - 经销商{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h4 class="mb-0"><i class="fas fa-truck"></i> 添加物流信息</h4>
            </div>
            <div class="card-body">
                <div class="mb-4">
                    <h5>产品信息</h5>
                    <table class="table table-borderless">
                        <tr>
                            <th width="30%">产品ID:</th>
                            <td><code>{{ product['product_id'] }}</code></td>
                        </tr>
                        <tr>
                            <th>产品名称:</th>
                            <td><strong>{{ product['name'] }}</strong></td>
                        </tr>
                        <tr>
                            <th>批次号:</th>
                            <td>{{ product['batch_number'] }}</td>
                        </tr>
                    </table>
                </div>

                <form method="POST" action="{{ url_for('distributor.add_logistics_for_product', product_id=product['product_id']) }}">
                    <div class="mb-3">
                        <label for="location" class="form-label">当前位置 *</label>
                        <input type="text" class="form-control" id="location" name="location" required
                               placeholder="例如: 上海仓库、北京物流中心">
                    </div>
                    <div class="mb-3">
                        <label for="status" class="form-label">物流状态 *</label>
                        <select class="form-select" id="status" name="status" required>
                            <option value="">请选择</option>
                            <option value="已入库">已入库</option>
                            <option value="运输中">运输中</option>
                            <option value="已到达">已到达</option>
                            <option value="配送中">配送中</option>
                            <option value="已签收">已签收</option>
                        </select>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-save"></i> 保存物流信息
                        </button>
                        <a href="{{ url_for('distributor.product_detail', product_id=product['product_id']) }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> 返回产品详情
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
