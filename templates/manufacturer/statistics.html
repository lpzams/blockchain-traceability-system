{% extends "base.html" %}

{% block title %}产品统计 - 生产商{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-12">
            <h2><i class="fas fa-chart-bar"></i> 产品统计</h2>
        </div>
    </div>

    <div class="row">
        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h6 class="card-title">注册产品数</h6>
                    <p class="card-text" style="font-size: 2em; font-weight: bold;">{{ statistics.total_products or 0 }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h6 class="card-title">质检通过数</h6>
                    <p class="card-text" style="font-size: 2em; font-weight: bold; color: green;">{{ statistics.passed_checks or 0 }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h6 class="card-title">质检失败数</h6>
                    <p class="card-text" style="font-size: 2em; font-weight: bold; color: red;">{{ statistics.failed_checks or 0 }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h6 class="card-title">产品转移数</h6>
                    <p class="card-text" style="font-size: 2em; font-weight: bold;">{{ statistics.transfers or 0 }}</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-12">
            <a href="{{ url_for('manufacturer.dashboard') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> 返回仪表板
            </a>
        </div>
    </div>
</div>
{% endblock %}
