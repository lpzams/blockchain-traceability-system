<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册新产品 - 产品溯源系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .register-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .register-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .register-header h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
            font-weight: 600;
        }

        .register-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 14px;
        }

        .register-form {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 14px;
        }

        .form-group label .required {
            color: #e74c3c;
            margin-left: 2px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            font-family: inherit;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .input-hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .register-form {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">产品溯源区块链系统</div>
        <div class="nav-menu">
            <a href="{{ url_for('manufacturer.dashboard') }}">我的产品</a>
            <a href="{{ url_for('manufacturer.register_product_page') }}" class="active">注册新产品</a>
            <a href="{{ url_for('blockchain_explorer') }}">区块链浏览器</a>
            <a href="{{ url_for('auth.logout') }}">退出登录</a>
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="register-container">
            <div class="register-header">
                <h1>📦 注册新产品</h1>
                <p>将产品信息永久记录到区块链，确保数据不可篡改</p>
            </div>

            <form method="POST" action="{{ url_for('manufacturer.register_product_page') }}" class="register-form">
                <div class="form-section">
                    <div class="form-section-title">基本信息</div>

                    <div class="form-group">
                        <label for="name">产品名称 <span class="required">*</span></label>
                        <input type="text" id="name" name="name" required placeholder="例如：有机五常大米">
                    </div>

                    <div class="form-group">
                        <label for="batch_number">生产批次号 <span class="required">*</span></label>
                        <input type="text" id="batch_number" name="batch_number" required placeholder="例如：BATCH2026060301">
                        <div class="input-hint">批次号用于追踪同批次产品，建议使用日期+序号格式</div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="production_date">生产日期 <span class="required">*</span></label>
                            <input type="date" id="production_date" name="production_date" required>
                        </div>

                        <div class="form-group">
                            <label for="expiry_date">过期日期</label>
                            <input type="date" id="expiry_date" name="expiry_date">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-title">产品详情</div>

                    <div class="form-group">
                        <label for="origin">产地 <span class="required">*</span></label>
                        <input type="text" id="origin" name="origin" required placeholder="例如：黑龙江省哈尔滨市五常市">
                    </div>

                    <div class="form-group">
                        <label for="specifications">产品规格</label>
                        <input type="text" id="specifications" name="specifications" placeholder="例如：5kg/袋，真空包装">
                    </div>

                    <div class="form-group">
                        <label for="description">产品描述</label>
                        <textarea id="description" name="description" rows="5" placeholder="详细描述产品的特征、品质、加工工艺等信息，帮助消费者更好地了解产品"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="{{ url_for('manufacturer.dashboard') }}" class="btn btn-secondary">取消</a>
                    <button type="submit" class="btn btn-primary">✓ 注册到区块链</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // 设置生产日期默认为今天
        document.getElementById('production_date').valueAsDate = new Date();

        // 自动计算建议的过期日期（180天后）
        const expiryInput = document.getElementById('expiry_date');
        const productionInput = document.getElementById('production_date');

        productionInput.addEventListener('change', function() {
            const productionDate = new Date(this.value);
            const expiryDate = new Date(productionDate);
            expiryDate.setDate(expiryDate.getDate() + 180); // 默认180天保质期

            if (!expiryInput.value) {
                expiryInput.valueAsDate = expiryDate;
            }
        });
    </script>
</body>
</html>
