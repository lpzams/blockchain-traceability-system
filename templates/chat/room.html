{% extends "base.html" %}

{% block title %}聊天室 - 产品溯源系统{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-12">
            <h2><i class="fas fa-comments"></i> 系统聊天室</h2>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-8 mx-auto">
            <div class="card" style="height: 600px; display: flex; flex-direction: column;">
                <div class="card-header">
                    <h5 class="mb-0">
                        <i class="fas fa-users"></i> 在线讨论
                        <span class="badge bg-success float-end" id="user-count">0 人</span>
                    </h5>
                </div>

                <div class="card-body" id="messages-container" style="overflow-y: auto; flex-grow: 1;">
                    <div class="text-center text-muted py-4">
                        <i class="fas fa-spinner fa-spin"></i> 加载消息中...
                    </div>
                </div>

                <div class="card-footer">
                    <form id="message-form" onsubmit="sendMessage(event)" style="display: flex; gap: 10px;">
                        <input type="text" id="message-input" class="form-control"
                               placeholder="输入消息..." maxlength="500" required>
                        <button type="submit" class="btn btn-primary" style="min-width: 100px;">
                            <i class="fas fa-paper-plane"></i> 发送
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a href="{% if session.get('role') == 'manufacturer' %}{{ url_for('manufacturer.dashboard') }}
                 {% elif session.get('role') == 'distributor' %}{{ url_for('distributor.dashboard') }}
                 {% elif session.get('role') == 'consumer' %}{{ url_for('consumer.dashboard') }}
                 {% elif session.get('role') == 'admin' %}{{ url_for('admin.dashboard') }}
                 {% elif session.get('role') == 'regulator' %}{{ url_for('regulator.dashboard') }}
                 {% else %}{{ url_for('index') }}{% endif %}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> 返回
        </a>
    </div>
</div>

<style>
    #messages-container {
        background-color: #f8f9fa;
        border-radius: 8px;
    }

    .message {
        margin-bottom: 12px;
        padding: 10px;
        background-color: white;
        border-radius: 6px;
        border-left: 3px solid #667eea;
    }

    .message.own {
        background-color: #e7f3ff;
        border-left-color: #0d6efd;
    }

    .message-header {
        font-size: 12px;
        color: #666;
        margin-bottom: 5px;
    }

    .message-author {
        font-weight: 600;
        margin-right: 5px;
    }

    .message-role {
        font-size: 10px;
        background-color: #e9ecef;
        padding: 2px 6px;
        border-radius: 3px;
        margin-left: 5px;
    }

    .message-text {
        color: #333;
        word-break: break-word;
    }

    .message-time {
        font-size: 11px;
        color: #999;
        margin-top: 5px;
    }
</style>

<script>
let lastMessageId = 0;

document.addEventListener('DOMContentLoaded', function() {
    loadMessages();
    updateUserCount();
    setInterval(loadMessages, 3000);
    setInterval(updateUserCount, 10000);
});

function loadMessages() {
    fetch('/chat/api/messages?limit=50')
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                const container = document.getElementById('messages-container');
                if (data.messages.length === 0) {
                    container.innerHTML = '<div class="text-center text-muted py-4">暂无消息</div>';
                } else {
                    container.innerHTML = data.messages.map(msg => {
                        const time = new Date(msg.created_at).toLocaleTimeString('zh-CN');
                        const isOwn = msg.username === '{{ session.username }}';
                        return `
                            <div class="message ${isOwn ? 'own' : ''}">
                                <div class="message-header">
                                    <span class="message-author">${escapeHtml(msg.username)}</span>
                                    <span class="message-role">${getRoleLabel(msg.role)}</span>
                                    <span class="message-time">${time}</span>
                                </div>
                                <div class="message-text">${escapeHtml(msg.message)}</div>
                            </div>
                        `;
                    }).join('');

                    // 滚动到底部
                    container.scrollTop = container.scrollHeight;
                }
            }
        })
        .catch(err => console.error('加载消息失败:', err));
}

function sendMessage(event) {
    event.preventDefault();
    const input = document.getElementById('message-input');
    const message = input.value.trim();

    if (!message) return;

    fetch('/chat/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            input.value = '';
            loadMessages();
        } else {
            alert('发送失败: ' + (data.error || '未知错误'));
        }
    })
    .catch(err => {
        console.error('发送消息失败:', err);
        alert('发送失败');
    });
}

function updateUserCount() {
    fetch('/chat/api/user-count')
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                document.getElementById('user-count').textContent = data.online_users + ' 人';
            }
        })
        .catch(err => console.error('获取用户数失败:', err));
}

function getRoleLabel(role) {
    const labels = {
        'manufacturer': '生产商',
        'distributor': '经销商',
        'consumer': '消费者',
        'admin': '管理员',
        'regulator': '监管者'
    };
    return labels[role] || role;
}

function escapeHtml(text) {
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, m => map[m]);
}
</script>
{% endblock %}
